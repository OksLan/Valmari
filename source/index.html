<!DOCTYPE html>
<html lang="ru" data-validate="html">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValMari</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="img/favicons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="img/favicons/180.png">
    <link rel="manifest" href="manifest.webmanifest.json">

    <link rel="stylesheet" href="sass/style.scss">
  </head>

  <body class="page-body">

    <h1 class="visually-hidden">ValMari</h1>

  <header class="header">
    <div class="container">
      <div class="header__top">

        <button class="header__burger" type="button" aria-label="Открыть меню">
          <span></span>
        </button>

        <a class="header__logo logo" href="#">
          <svg class="logo__image" width="226" height="63" aria-hidden="true" focusable="false">
            <use href="/__spritemap#sprite-logo-desktop"></use>
          </svg>
        </a>

        <div class="header__contacts">

          <div class="header__phone">
            <svg class="logo__image" width="28" height="28" aria-hidden="true" focusable="false">
              <use href="/__spritemap#sprite-phone"></use>
            </svg>
            <a class="phone" href="tel:+0800508622">
              0 (800) 508-622
            </a>
          </div>

          <ul class="header__socials socials">
            <li class="socials__item">
              <a class="socials__link" href="#" aria-label="Facebook">
                <svg class="logo__image" width="28" height="28" aria-hidden="true" focusable="false">
                  <use href="/__spritemap#sprite-facebook-green"></use>
                </svg>
              </a>
            </li>

            <li class="socials__item">
              <a class="socials__link" href="#" aria-label="Instagram">
                <svg class="logo__image" width="28" height="28" aria-hidden="true" focusable="false">
                  <use href="/__spritemap#sprite-instagram-green"></use>
                </svg>
              </a>
            </li>
          </ul>

          <div class="language-switcher">

            <button class="language-switcher__current" type="button" aria-label="Выбор языка">
              <img
                class="language-switcher__flag"
                src="img/russian.png"
                width="41"
                height="41"
                alt="Русский">
              <svg
                class="language-switcher__arrow"
                width="10"
                height="6"
                aria-hidden="true">
                <use href="/__spritemap#sprite-dropdown"></use>
              </svg>
            </button>

            <ul class="language-switcher__list">

              <li class="language-switcher__item">
                <a class="language-switcher__link" href="#">
                  <img
                    class="language-switcher__flag"
                    src="img/russian.png"
                    width="41"
                    height="41"
                    alt="English">
                </a>
              </li>

              <li class="language-switcher__item">
                <a class="language-switcher__link" href="#">
                  <img
                    class="language-switcher__flag"
                    src="img/russian.png"
                    width="41"
                    height="41"
                    alt="Chinese">
                </a>
              </li>

            </ul>
          </div>

        </div>
      </div>
    </div>

    <div class="header__divider"></div>

    <div class="container">
      <div class="header__bottom">
        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item">
              <a class="nav__link" href="#">Курсы обучения</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Вебинары</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Видео-уроки</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Блог</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">О нас</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Прайс</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Расписание</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Акции</a>
            </li>

            <li class="nav__item">
              <a class="nav__link" href="#">Магазин</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    </div>
  </header>

  <main class="main">

    <section class="promo">
      <div class="container">
        <div class="promo__content">
          <div class="promo__headings">
            <span class="promo__headings-free">Бесплатный вебинар</span>
            <h2 class="promo__headings-main">Профессия<br>косметолог</h2>
            <span class="promo__text">Приглашаем на&nbsp;бесплатный вебинар 
              для профессиональных косметологов и&nbsp;интересующихся этой профессией</span>
            <div class="promo__buttons">
              <button class="promo__button button" type="button">Зарегистрироваться</button>
              <button class="promo__button button" type="button">Узнать подробнее</button>
            </div>
          </div>
          <div class="promo__image">
            <picture>
              <source media="(min-width: 1365px)" type="image/webp" width="681" height="556"
              srcset="img/promo/experts-desktop@1x.webp 1x, img/promo/experts-desktop@2x.webp 2x">
              <source media="(min-width: 767px)" type="image/webp" width="354" height="289"
              srcset="img/promo/experts-tablet@1x.webp 1x, img/promo/experts-tablet@2x.webp 2x">
              <source media="(min-width: 1365px)" type="image/png" width="681" height="556"
              srcset="img/promo/experts-desktop@1x.png 1x, img/promo/experts-desktop@2x.png 2x">
              <source media="(min-width: 767px)" type="image/png" width="354" height="289"
              srcset="img/promo/experts-tablet@1x.png 1x, img/promo/experts-tablet@2x.png 2x">
              <img class="promo__pic" width="226" height="192" src="img/promo/experts-desktop@1x.png" alt="эксперты-косметологи ValMari">
            </picture>
          </div>
        </div>
      </div>
    </section>

    <section class="figures"></section>
    <section class="courses"></section>
    <section class="about"></section>
    <section class="training"></section>
    <section class="models"></section>
    <section class="master-classes"></section>
    <section class="why-us"></section>
    <section class="offers"></section>
    <section class="callback"></section>
  </main>

  <footer class="footer"></footer>

    <script type="module" src="js/main.js"></script>
  </body>

</html>
